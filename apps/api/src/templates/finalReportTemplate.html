<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<style>

@page{
  size: letter;
  margin: 18mm;
}

body{
  font-family: Arial, sans-serif;
  margin:0;
  color:#1f2937;
}

.container{
  max-width:760px;
  margin:auto;
}

.header{
  text-align:center;
  margin-bottom:12px;
}

.identity{
  margin-top:10px;
  font-size:15px;
}

.identity small{
  display:block;
  font-size:12px;
  color:#6b7280;
}

.line{
  height:5px;
  background: linear-gradient(to right, #1e3a8a, #60a5fa);
  border-radius:3px;
  margin-top:10px;
  margin-bottom:12px;
}

.card{
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  background:#f9fafb;
  border:1px solid #e5e7eb;
  page-break-inside: avoid;
}

.section-blue{
  background:#eff6ff;
  border:1px solid #dbeafe;
}

h3{
  margin:0 0 8px 0;
  font-size:14px;
}

.analysis{
  line-height:1.6;
  font-size:11.5px;
  text-align:justify;
}

.kpis{
  display:flex;
  gap:10px;
}

.kpi{
  flex:1;
  background:#fff;
  padding:12px;
  border-radius:8px;
  text-align:center;
  border:1px solid #e5e7eb;
}

.result{
  color:white;
  padding:8px;
  border-radius:6px;
  font-weight:bold;
}

.radar{
  text-align:center;
}

.footer{
  margin-top:15px;
  font-size:10px;
  text-align:center;
  color:#6b7280;
}

</style>

</head>

<body>

<div class="container">

  <!-- HEADER -->

  <div class="header">

    {{logo}}

    <h2>INFORME FINAL ECOS</h2>

  </div>

  <!-- IDENTIDAD -->

  <div class="identity">

    <b>{{participant}}</b>

    <small>{{company}}</small>

    <small>Fecha de informe: {{date}}</small>

  </div>

  <div class="line"></div>

  <!-- KPI -->

  <div class="card section-blue">

    <div class="kpis">

      <div class="kpi">

        Puntaje Global<br/>

        <b>{{score}}%</b>

      </div>

      <div class="kpi">

        Resultado<br/>

        <div
          class="result"
          style="background:{{color}}"
        >
          {{result}}
        </div>

      </div>

    </div>

  </div>

  <!-- RADAR -->

  <div class="card">

    <div class="radar">

      {{radar}}

    </div>

  </div>

  <!-- ANALISIS -->

  <div class="card">

    <h3>Análisis Ejecutivo</h3>

    <div class="analysis">

      {{analysis}}

    </div>

  </div>

  <!-- FOOTER -->

  <div class="footer">

    Informe generado por ECOS – Plataforma de Evaluación de Competencias en Seguridad

  </div>

</div>

</body>

</html>
