<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<style>

@page{
  size: letter;
  margin: 12mm;
}

body{
  font-family: Helvetica, Arial, sans-serif;
  margin:0;
  padding:0;
  color:#1e293b;
  background:#ffffff;
}

.container{
  width:100%;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:16px;
}

.logo{
  width:180px;
}

.header-title{
  text-align:right;
}

.main-title{
  font-size:28px;
  font-weight:700;
  color:#0f172a;
  margin-bottom:4px;
}

.sub-title{
  font-size:12px;
  color:#64748b;
}

.line{
  height:5px;
  background:#0f766e;
  margin-top:12px;
  margin-bottom:20px;
}

.top-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:22px;
}

.identity-card{
  background:#ecfdf5;
  padding:22px;
  border-radius:12px;
}

.identity-title{
  font-size:12px;
  color:#0f766e;
  font-weight:bold;
  margin-bottom:10px;
}

.participant-name{
  font-size:32px;
  font-weight:700;
  color:#0f172a;
  margin-bottom:10px;
}

.identity-data{
  font-size:13px;
  line-height:1.8;
}

.veredict-card{
  background:#065f46;
  color:white;
  padding:22px;
  border-radius:12px;
}

.veredict-title{
  font-size:13px;
  font-weight:bold;
  margin-bottom:10px;
}

.veredict-main{
  font-size:30px;
  font-weight:700;
  margin-bottom:10px;
}

.veredict-text{
  font-size:13px;
  line-height:1.7;
}

.kpi-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  margin-bottom:24px;
}

.kpi{
  border:1px solid #e2e8f0;
  padding:14px;
  border-radius:10px;
}

.kpi-title{
  font-size:12px;
  margin-bottom:8px;
  color:#475569;
}

.kpi-score{
  font-size:42px;
  font-weight:700;
}

.kpi-result{
  margin-top:8px;
  font-size:12px;
  font-weight:bold;
}

.green{
  color:#16a34a;
}

.orange{
  color:#d97706;
}

.red{
  color:#dc2626;
}

.risk-container{
  text-align:center;
  margin-top:20px;
  margin-bottom:30px;
}

.risk-title{
  font-size:16px;
  font-weight:bold;
  margin-bottom:16px;
}

.risk-bar{
  width:120px;
  border-radius:8px;
  overflow:hidden;
  border:1px solid #cbd5e1;
}

.risk-green{
  background:#10b981;
  color:white;
  padding:18px;
  font-size:12px;
  font-weight:bold;
}

.risk-orange{
  background:#d97706;
  color:white;
  padding:18px;
  font-size:12px;
  font-weight:bold;
}

.risk-red{
  background:#ef4444;
  color:white;
  padding:18px;
  font-size:12px;
  font-weight:bold;
}

.section{
  margin-bottom:26px;
  page-break-inside:avoid;
}

.section-title{
  font-size:22px;
  font-weight:700;
  color:#0f766e;
  margin-bottom:14px;
  border-bottom:1px solid #d1d5db;
  padding-bottom:8px;
}

.text{
  font-size:13px;
  line-height:1.8;
  text-align:justify;
}

.radar{
  text-align:center;
  margin-top:20px;
  margin-bottom:30px;
}

.summary-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.good-box{
  background:#ecfdf5;
  padding:20px;
  border-radius:12px;
}

.bad-box{
  background:#fef2f2;
  padding:20px;
  border-radius:12px;
}

.summary-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:10px;
}

.alert-box{
  background:#fef3c7;
  border:2px solid #f59e0b;
  border-radius:12px;
  padding:20px;
  margin-top:18px;
}

.alert-title{
  font-size:18px;
  font-weight:700;
  color:#92400e;
  margin-bottom:10px;
}

.legal-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:8px;
  margin-top:20px;
}

.legal-card{
  background:#065f46;
  color:white;
  padding:16px;
  border-radius:10px;
  min-height:120px;
}

.legal-title{
  font-size:16px;
  font-weight:700;
  margin-bottom:10px;
}

.legal-text{
  font-size:12px;
  line-height:1.5;
}

.footer{
  margin-top:30px;
  text-align:center;
  font-size:10px;
  color:#64748b;
  border-top:1px solid #cbd5e1;
  padding-top:10px;
}

.page-break{
  page-break-before:always;
}

</style>

</head>

<body>

<div class="container">

{{logo}}

</div>

</body>
</html>
